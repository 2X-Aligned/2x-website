<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2X Aligned — The Future of Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #000;
    color: #fff;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .logo-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    position: relative;
  }

  /* soft luminous halo behind the logo */
  .logo-mark::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(300px, 50vw, 600px);
    height: clamp(200px, 30vw, 360px);
    background: radial-gradient(ellipse, rgba(80, 120, 255, 0.06) 0%, rgba(40, 70, 200, 0.02) 40%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: breathe 8s ease-in-out infinite;
  }

  .logo-2x {
    font-size: clamp(100px, 18vw, 200px);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 0.85;
    color: #f0f2ff;
    text-shadow:
      0 0 40px rgba(120, 150, 255, 0.12),
      0 0 100px rgba(80, 110, 255, 0.06);
    position: relative;
  }

  .logo-aligned {
    font-size: clamp(22px, 4.2vw, 50px);
    font-weight: 500;
    letter-spacing: 0.35em;
    text-indent: 0.35em;
    color: rgba(200, 210, 240, 0.6);
    margin-top: 6px;
    position: relative;
  }

  .divider {
    margin-top: clamp(28px, 4vh, 48px);
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    animation: fadeIn 1.2s ease 0.8s forwards;
  }

  .tagline {
    margin-top: clamp(16px, 2.5vh, 28px);
    font-size: clamp(12px, 1.5vw, 16px);
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    opacity: 0;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.75s forwards;
  }

  .cta {
    margin-top: clamp(28px, 4vh, 52px);
    pointer-events: all;
    opacity: 0;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.05s forwards;
  }

  .cta a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 34px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    font-size: clamp(12px, 1.3vw, 14px);
    font-weight: 500;
    letter-spacing: 0.08em;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    background: rgba(255,255,255,0.02);
  }

  .cta a:hover {
    background: rgba(255,255,255,0.95);
    color: #0a0a1a;
    border-color: rgba(255,255,255,0.95);
    box-shadow: 0 0 30px rgba(255,255,255,0.06);
    transform: translateY(-1px);
  }

  .cta a svg {
    width: 14px;
    height: 14px;
    transition: transform 0.35s ease;
    opacity: 0.7;
  }

  .cta a:hover svg { transform: translateX(3px); opacity: 1; }

  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
    padding: 24px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.12);
    pointer-events: none;
    opacity: 0;
    animation: fadeIn 1s ease 1.8s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="overlay">
  <div class="logo-mark">
    <div class="logo-2x">2X</div>
    <div class="logo-aligned">ALIGNED</div>
  </div>
  <div class="divider"></div>
  <div class="tagline">The future of marketing, engineered.</div>
  <div class="cta">
    <a href="mailto:berry@2xaligned.com">
      Get in touch
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>

<div class="footer">&copy; 2026 2X ALIGNED</div>

<script>
const canvas = document.getElementById('bg');
let mouseSmooth = { x: 0.5, y: 0.5 };
let mouseTarget = { x: 0.5, y: 0.5 };

document.addEventListener('mousemove', e => {
  mouseTarget.x = e.clientX / window.innerWidth;
  mouseTarget.y = e.clientY / window.innerHeight;
});
document.addEventListener('touchmove', e => {
  mouseTarget.x = e.touches[0].clientX / window.innerWidth;
  mouseTarget.y = e.touches[0].clientY / window.innerHeight;
}, { passive: true });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  return dpr;
}

// smooth mouse lerp (runs in both paths)
function tickMouse() {
  mouseSmooth.x += (mouseTarget.x - mouseSmooth.x) * 0.03;
  mouseSmooth.y += (mouseTarget.y - mouseSmooth.y) * 0.03;
}


// ════════════════════════════════════════════════════════════
//  WebGPU — everything in a single fullscreen fragment shader.
//  No instanced geometry, no parallax shifting, no seams.
//  Procedural starfield + subtle atmosphere, all pixel-perfect.
// ════════════════════════════════════════════════════════════
async function initWebGPU() {
  if (!navigator.gpu) throw new Error('No WebGPU');
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) throw new Error('No adapter');
  const device = await adapter.requestDevice();

  const ctx = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();

  let dpr = resize();
  ctx.configure({ device, format, alphaMode: 'opaque' });
  window.addEventListener('resize', () => {
    dpr = resize();
    ctx.configure({ device, format, alphaMode: 'opaque' });
  });

  const uniformBuf = device.createBuffer({
    size: 32,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
  });

  const module = device.createShaderModule({ code: `
    struct U { time:f32, aspect:f32, mx:f32, my:f32, rx:f32, ry:f32, p1:f32, p2:f32 };
    @group(0) @binding(0) var<uniform> u: U;

    // ── Hashes ──
    fn hash21(p:vec2f)->f32 {
      var p3 = fract(vec3f(p.x, p.y, p.x) * vec3f(0.1031, 0.1030, 0.0973));
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }
    fn hash22(p:vec2f)->vec2f {
      let p3 = fract(vec3f(p.x, p.y, p.x) * vec3f(0.1031, 0.1030, 0.0973));
      let p4 = p3 + dot(p3, p3.yzx + 33.33);
      return fract(vec2f((p4.x+p4.y)*p4.z, (p4.x+p4.z)*p4.y));
    }

    // ── Value noise for atmosphere ──
    fn vnoise(p:vec2f)->f32 {
      let i=floor(p); let f=fract(p);
      let s=f*f*(3.0-2.0*f);
      return mix(
        mix(hash21(i), hash21(i+vec2f(1,0)), s.x),
        mix(hash21(i+vec2f(0,1)), hash21(i+vec2f(1,1)), s.x), s.y);
    }
    fn fbm(p_in:vec2f)->f32 {
      var p=p_in; var v=0.0; var a=0.5;
      for(var i=0;i<4;i++){ v+=a*vnoise(p); p=p*2.03+vec2f(1.7,-1.3); a*=0.47; }
      return v;
    }

    // ── Star layer: cell-based procedural stars ──
    // Each cell gets 0 or 1 star with random position, brightness, size, twinkle
    fn starField(uv:vec2f, scale:f32, time:f32, dimFactor:f32) -> f32 {
      let cell = floor(uv * scale);
      let cellUV = fract(uv * scale);

      // star existence probability — ~55% of cells have a star
      let r = hash21(cell * 127.31);
      if (r > 0.55) { return 0.0; }

      // star position within cell
      let starPos = hash22(cell * 213.17) * 0.7 + 0.15;
      let d = length(cellUV - starPos);

      // star properties — gentler curve so more stars are visible
      let brightness = pow(hash21(cell * 371.91), 1.4) * dimFactor;
      let twinklePhase = hash21(cell * 491.23) * 6.283;
      let twinkleSpeed = hash21(cell * 617.37) * 1.2 + 0.3;
      let starSize = (hash21(cell * 743.51) * 0.7 + 0.3) / scale;

      // twinkle
      let twinkle = sin(twinklePhase + time * twinkleSpeed) * 0.35 + 0.65;

      // soft gaussian-ish falloff — wider glow
      let glow = exp(-d * d / (starSize * starSize * 0.02)) * brightness * twinkle;
      // tight bright core
      let core = exp(-d * d / (starSize * starSize * 0.0012)) * brightness * twinkle * 1.0;

      return glow + core;
    }

    struct V{@builtin(position) pos:vec4f, @location(0) uv:vec2f};
    @vertex fn vs(@builtin(vertex_index) i:u32)->V {
      var p=array<vec2f,3>(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));
      var o:V; o.pos=vec4f(p[i],0,1); o.uv=p[i]*0.5+0.5; return o;
    }

    @fragment fn fs(@location(0) uv:vec2f)->@location(0) vec4f {
      let t = u.time;
      var p = vec2f(uv.x * u.aspect, uv.y);

      // ── Deep black base ──
      var col = vec3f(0.0, 0.0, 0.0);

      // ── Very subtle atmospheric depth ──
      // Faint dark gradient from center — like light pollution glow, almost invisible
      let vc = uv - 0.5;
      let vd = dot(vc, vc);
      col += vec3f(0.006, 0.008, 0.025) * (1.0 - vd * 2.2);

      // ultra-subtle nebula wash — just enough to break pure black monotony
      let q = fbm(p * 0.5 + t * 0.015);
      let nebula = pow(q, 2.0) * 0.02;
      col += vec3f(0.01, 0.015, 0.05) * nebula;

      // ── Stars: 4 density layers at different scales ──
      // far field: tiny, dense, moderate
      let s1 = starField(p, 80.0, t, 0.45);
      // mid field
      let s2 = starField(p + vec2f(37.7, 91.3), 40.0, t, 0.85);
      // near field: brighter
      let s3 = starField(p + vec2f(73.1, 17.9), 18.0, t, 1.3);
      // sparse bright stars
      let s4 = starField(p + vec2f(151.3, 63.7), 8.0, t, 1.8);

      let stars = s1 + s2 + s3 + s4;

      // star color: dim stars blue-white, bright stars pure white
      let starCol = mix(
        vec3f(0.7, 0.78, 1.0),    // cool dim stars
        vec3f(1.0, 0.98, 0.95),   // warm bright stars — near pure white
        clamp(stars * 1.2, 0.0, 1.0)
      );
      col += starCol * stars * 1.3;

      // ── Mouse: extremely subtle warm glow near cursor, no position shifts ──
      let mp = vec2f(u.mx * u.aspect, 1.0 - u.my);
      let md = length(p - mp);
      let mouseGlow = exp(-md * md * 1.8) * 0.012;
      col += vec3f(0.04, 0.04, 0.08) * mouseGlow;

      // ── Vignette: darken edges gently ──
      col *= 1.0 - vd * 0.5;

      return vec4f(col, 1.0);
    }
  `});

  const pipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module, entryPoint: 'vs' },
    fragment: { module, entryPoint: 'fs', targets: [{ format }] },
    primitive: { topology: 'triangle-list' },
  });
  const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: { buffer: uniformBuf } }],
  });

  function frame() {
    tickMouse();
    const now = performance.now() / 1000;
    const w = canvas.width, h = canvas.height;

    device.queue.writeBuffer(uniformBuf, 0, new Float32Array([
      now, w/h, mouseSmooth.x, mouseSmooth.y, w, h, 0, 0,
    ]));

    const enc = device.createCommandEncoder();
    const view = ctx.getCurrentTexture().createView();
    const rp = enc.beginRenderPass({
      colorAttachments: [{ view, loadOp: 'clear', storeOp: 'store', clearValue: {r:0,g:0,b:0,a:1} }],
    });
    rp.setPipeline(pipeline);
    rp.setBindGroup(0, bindGroup);
    rp.draw(3);
    rp.end();
    device.queue.submit([enc.finish()]);
    requestAnimationFrame(frame);
  }

  frame();
  return true;
}


// ════════════════════════════════════════════════════
//  Canvas2D fallback — twinkling starfield, no parallax
// ════════════════════════════════════════════════════
function initCanvas2D() {
  const ctx = canvas.getContext('2d');
  let dpr = resize();
  window.addEventListener('resize', () => {
    dpr = resize();
    // regenerate stars on resize for coverage
    generateStars();
  });

  const stars = [];

  function generateStars() {
    stars.length = 0;
    const w = canvas.width, h = canvas.height;
    const area = w * h;
    const NUM = Math.min(Math.round(area / 1600), 1600);

    for (let i = 0; i < NUM; i++) {
      const brightness = Math.pow(Math.random(), 1.8);
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: brightness * 2.0 + 0.3,
        alpha: brightness * 0.8 + 0.08,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 1.2 + 0.3,
        temp: Math.random(),
      });
    }
  }

  generateStars();

  let t = 0;
  function frame() {
    tickMouse();
    t += 0.016;
    const w = canvas.width, h = canvas.height;

    // background: near black with faint center glow
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    const cg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.55);
    cg.addColorStop(0, 'rgba(6, 8, 25, 1)');
    cg.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = cg;
    ctx.fillRect(0, 0, w, h);

    // draw stars
    for (const s of stars) {
      const twinkle = Math.sin(s.phase + t * s.speed) * 0.35 + 0.65;
      const alpha = s.alpha * twinkle;

      // color
      const warm = [255, 245, 235];
      const cool = [190, 210, 255];
      const cr = Math.round(warm[0] + (cool[0] - warm[0]) * s.temp);
      const cg2 = Math.round(warm[1] + (cool[1] - warm[1]) * s.temp);
      const cb = Math.round(warm[2] + (cool[2] - warm[2]) * s.temp);

      const r = s.r * twinkle;

      // glow for brighter stars
      if (alpha > 0.12) {
        const gr = r * 6;
        const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, gr);
        glow.addColorStop(0, `rgba(${cr},${cg2},${cb},${alpha * 0.2})`);
        glow.addColorStop(1, `rgba(${cr},${cg2},${cb},0)`);
        ctx.fillStyle = glow;
        ctx.fillRect(s.x - gr, s.y - gr, gr * 2, gr * 2);
      }

      // core dot
      ctx.beginPath();
      ctx.arc(s.x, s.y, Math.max(r * 0.7, 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${cr},${cg2},${cb},${alpha})`;
      ctx.fill();
    }

    // mouse glow — very subtle
    const mx = mouseSmooth.x * w, my = mouseSmooth.y * h;
    const mg = ctx.createRadialGradient(mx, my, 0, mx, my, w * 0.15);
    mg.addColorStop(0, 'rgba(15, 20, 50, 0.05)');
    mg.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = mg;
    ctx.beginPath();
    ctx.arc(mx, my, w * 0.15, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(frame);
  }
  frame();
}


// ── Boot ──
resize();
initWebGPU().catch(e => {
  console.log('WebGPU unavailable:', e.message, '— Canvas2D fallback');
  resize();
  initCanvas2D();
});
</script>
</body>
</html>
